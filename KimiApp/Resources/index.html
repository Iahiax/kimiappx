<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KimiApp – ChatGPT Style</title>

<script src="https://js.puter.com/v2/"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        box-sizing: border-box;
    }

    .msg {
        max-width: 80%;
        padding: 12px 16px;
        margin: 10px 0;
        border-radius: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
        font-size: 15px;
    }

    .me {
        background: #0a84ff;
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 4px;
    }

    .ai {
        background: #2c2c2e;
        color: #fff;
        margin-right: auto;
        border-bottom-left-radius: 4px;
    }

    #inputBox {
        display: flex;
        padding: 10px;
        background: #1c1c1e;
        border-top: 1px solid #333;
    }

    #input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #2c2c2e;
        color: white;
        font-size: 15px;
    }

    #sendBtn {
        padding: 12px 18px;
        margin-left: 10px;
        background: #0a84ff;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 15px;
    }
</style>
</head>

<body>

<div id="messages"></div>

<div id="inputBox">
    <input id="input" type="text" placeholder="اكتب رسالتك…" />
    <button id="sendBtn" onclick="send()">إرسال</button>
</div>

<script>
const messages = document.getElementById("messages");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "me");
    input.value = "";

    addMessage("… يفكر", "ai");

    try {
        const response = await puter.ai.chat(text, {
            model: "moonshotai/kimi-k2.6"
        });

        messages.lastChild.innerText = response.output_text;

    } catch (err) {
        messages.lastChild.innerText = "خطأ: " + err;
    }
}
</script>

</body>
</html>
