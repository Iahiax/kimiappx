name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      BUILD_DIR: build

    steps:
      - uses: actions/checkout@v3

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          ls -la

      - name: Import signing identities (if provided)
        if: ${{ secrets.P12_BASE64 != '' && secrets.PROFILE_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          provisioning-profile-base64: ${{ secrets.PROFILE_BASE64 }}

      - name: Prepare build dir
        run: mkdir -p $BUILD_DIR

      - name: Build Archive
        run: |
          set -o pipefail
          xcodebuild -project KimiApp.xcodeproj -scheme KimiApp -sdk iphoneos -configuration Release -archivePath $BUILD_DIR/KimiApp.xcarchive clean archive | tee xcodebuild.log || (tail -n 200 xcodebuild.log && exit 1)

      - name: Export IPA
        run: |
          set -o pipefail
          if [ -f ExportOptions.plist ]; then
            xcodebuild -exportArchive -archivePath $BUILD_DIR/KimiApp.xcarchive -exportPath $BUILD_DIR -exportOptionsPlist ExportOptions.plist | tee export.log || (tail -n 200 export.log && exit 1)
          else
            echo "ExportOptions.plist not found, exporting with ad-hoc defaults"
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0"><dict><key>method</key><string>ad-hoc</string></dict></plist>' > "$BUILD_DIR/ExportOptions.plist"
            xcodebuild -exportArchive -archivePath $BUILD_DIR/KimiApp.xcarchive -exportPath $BUILD_DIR -exportOptionsPlist $BUILD_DIR/ExportOptions.plist | tee export.log || (tail -n 200 export.log && exit 1)
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            xcodebuild.log
            export.log

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: kimi-ios-app
          path: ${{ env.BUILD_DIR }}/*.ipa
